services:
  clara:
    image: ${DOCKER_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}
    restart: always
    ports:
      - '127.0.0.1:2000:2000'
    env_file:
      - .env.production
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs:/app/logs
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2000/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  app-network:
    name: ${APP_NETWORK}
    external: true
