name: Deploy AkselLearn FE (Temp — via Dev Origin)

# Temporary deployment bridge:
# Triggers on the 'aksellearn' orphan branch of this (dev) repo.
# Builds the image under THIS repo's GHCR and deploys to the client's VPS.
# Transition to client's own repo CI/CD once they set up their repo.

on:
  push:
    branches: ["aksellearn"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aksellearn-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout aksellearn branch
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-time vars: Vite inlines these into the JS bundle
          build-args: |
            VITE_API_URL=${{ secrets.AKSELLEARN_VITE_API_URL }}
            VITE_API_APP_ID=${{ secrets.AKSELLEARN_VITE_API_APP_ID }}
            VITE_ENABLE_SIGNATURE=${{ secrets.AKSELLEARN_VITE_ENABLE_SIGNATURE }}
          cache-from: type=gha

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aksellearn branch
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to client server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AKSELLEARN_SERVER_HOST }}
          username: ${{ secrets.AKSELLEARN_SERVER_USER }}
          key: ${{ secrets.AKSELLEARN_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AKSELLEARN_SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: "/var/www/aksellearn-fe"

      - name: Deploy to client server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AKSELLEARN_SERVER_HOST }}
          username: ${{ secrets.AKSELLEARN_SERVER_USER }}
          key: ${{ secrets.AKSELLEARN_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AKSELLEARN_SERVER_PORT || 22 }}
          envs: INTERNAL_API_URL,CLARA_APP_SECRET,CLARA_LICENSE_KEY
          script: |
            set -e

            sudo mkdir -p /var/www/aksellearn-fe
            sudo chown -R $USER:$USER /var/www/aksellearn-fe
            cd /var/www/aksellearn-fe

            # Remove old container to prevent name conflict
            docker stop aksellearn-aksellearn 2>/dev/null || true
            docker rm aksellearn-aksellearn 2>/dev/null || true

            # We rely on the existing .env.production file managed manually on the server.

            export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Login to GHCR (dev origin — we control this)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull and restart
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate --wait

            # Smart cleanup: keep only 5 most recent images
            docker images --format "{{.Repository}}:{{.Tag}} {{.CreatedAt}}" \
              | grep "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
              | sort -k2 -r \
              | awk 'NR>5 {print $1}' \
              | xargs -r docker rmi

            docker builder prune -f
            echo "AkselLearn FE deployment complete!"
        env:
          INTERNAL_API_URL: ${{ secrets.AKSELLEARN_INTERNAL_API_URL }}
          CLARA_APP_SECRET: ${{ secrets.AKSELLEARN_AKSELLEARN_APP_SECRET }}
          CLARA_LICENSE_KEY: ${{ secrets.AKSELLEARN_AKSELLEARN_LICENSE_KEY }}
